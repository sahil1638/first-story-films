name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Build, lint, and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Start local Supabase to validate migrations
        run: supabase start

      - name: Configure environment variables for tests
        run: |
          supabase status -o json > supabase_status.json
          echo "NEXT_PUBLIC_SUPABASE_URL=$(jq -r '.api_url' supabase_status.json)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(jq -r '.anon_key' supabase_status.json)" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(jq -r '.service_role_key' supabase_status.json)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> $GITHUB_ENV

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Supabase Auth config audit
        run: npm run audit:supabase-auth
        